name: Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "$RUNNER_TEMP/source.tar.gz"
          tar -xzf "$RUNNER_TEMP/source.tar.gz" -C "$GITHUB_WORKSPACE" --strip-components=1

      - name: Install Flutter
        shell: bash
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter version
        shell: bash
        run: flutter --version

      - name: Root checks
        shell: bash
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter pub publish --dry-run

      - name: Example checks
        shell: bash
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Mobile preview checks
        shell: bash
        working-directory: example/mobile_preview
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter build web --base-href /mobile_preview/ --pwa-strategy=none

      - name: Build docs web
        shell: pwsh
        run: |
          ./tool/build_docs.ps1 -Flutter flutter
