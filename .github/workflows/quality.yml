name: Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: 3.41.0
      PUB_HOSTED_URL: https://pub.dev
      FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com

    steps:
      - name: Checkout repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "$RUNNER_TEMP/source.tar.gz"
          tar -xzf "$RUNNER_TEMP/source.tar.gz" -C "$GITHUB_WORKSPACE" --strip-components=1

      - name: Install Flutter
        shell: bash
        run: |
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter version
        shell: bash
        run: flutter --version

      - name: Root pub get
        shell: bash
        run: flutter pub get

      - name: Root analyze
        shell: bash
        run: |
          set +e
          flutter analyze 2>&1 | tee "$RUNNER_TEMP/flutter-analyze.log"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "## flutter analyze failed"
              echo
              echo '```text'
              tail -n 200 "$RUNNER_TEMP/flutter-analyze.log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            python3 - "$RUNNER_TEMP/flutter-analyze.log" <<'PY'
          import re
          import sys
          from pathlib import Path

          for line in Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace").splitlines():
              match = re.search(r" • (?P<message>.*?) • (?P<file>[^:]+):(?P<line>\d+):(?P<column>\d+) • ", line)
              if not match:
                  continue
              message = match.group("message").replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(
                  "::error file={file},line={line},col={column}::{message}".format(
                      file=match.group("file"),
                      line=match.group("line"),
                      column=match.group("column"),
                      message=message,
                  )
              )
          PY

            exit "$status"
          fi

      - name: Root test
        shell: bash
        run: flutter test

      - name: Root publish dry run
        shell: bash
        run: flutter pub publish --dry-run

      - name: Example checks
        shell: bash
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Mobile preview checks
        shell: bash
        working-directory: example/mobile_preview
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter build web --base-href /mobile_preview/ --pwa-strategy=none

      - name: Build docs web
        shell: pwsh
        run: |
          ./tool/build_docs.ps1 -Flutter flutter
