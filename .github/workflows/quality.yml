name: Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Root checks
        shell: pwsh
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter pub publish --dry-run

      - name: Example checks
        shell: pwsh
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
          flutter test

      - name: Mobile preview checks
        shell: pwsh
        working-directory: example/mobile_preview
        run: |
          flutter pub get
          flutter analyze
          flutter test
          flutter build web --base-href /mobile_preview/ --pwa-strategy=none

      - name: Build docs web
        shell: pwsh
        run: |
          if (Test-Path example/web/mobile_preview) {
            Remove-Item -LiteralPath example/web/mobile_preview -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path example/web/mobile_preview | Out-Null
          Copy-Item -Path example/mobile_preview/build/web/* -Destination example/web/mobile_preview -Recurse -Force
          Push-Location example
          flutter build web --pwa-strategy=none
          Pop-Location
