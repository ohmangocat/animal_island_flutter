name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    env:
      FLUTTER_VERSION: 3.41.0

    steps:
      - name: Checkout repository
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "$RUNNER_TEMP/source.tar.gz"
          tar -xzf "$RUNNER_TEMP/source.tar.gz" -C "$GITHUB_WORKSPACE" --strip-components=1

      - name: Install Flutter
        shell: bash
        run: |
          git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter version
        shell: bash
        run: flutter --version

      - name: Build docs and mobile preview
        shell: pwsh
        run: |
          ./tool/build_docs.ps1 `
            -Flutter flutter `
            -DocsBaseHref /animal_island_flutter/ `
            -MobilePreviewBaseHref /animal_island_flutter/mobile_preview/

      - name: Publish gh-pages branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEPLOY_DIR="$RUNNER_TEMP/animal-island-pages"
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"
          cp -R example/build/web/. "$DEPLOY_DIR/"
          touch "$DEPLOY_DIR/.nojekyll"

          cd "$DEPLOY_DIR"
          git init
          git checkout -B gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy docs ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
